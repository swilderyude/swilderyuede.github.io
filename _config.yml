# 博客配置
name: Swilderyu 个人博客
description: 计算机研究生的技术学习与科研记录
baseurl: ""
url: "https://swilderyuede.github.io"

# 作者信息
author:
  name: Swilderyu
  email: swilderyu@example.com
  bio: 计算机科学与技术专业研究生，专注于人工智能、算法与系统设计

# 博客设置
markdown: kramdown
highlighter: null
permalink: /:year/:month/:day/:title/

# Kramdown 配置
kramdown:
  input: GFM
  hard_wrap: false

# 分类与标签
collections:
  categories:
    output: true
    permalink: /categories/:name/
  tags:
    output: true
    permalink: /tags/:name/

# 导航菜单
menu:
  - title: 首页
    url: /
  - title: 科研
    url: /categories/科研/
    subcategories:
      - title: 人工智能
        url: /categories/科研/人工智能/
  - title: 项目
    url: /categories/项目/
    subcategories:
      - title: 机器学习
        url: /categories/项目/机器学习/
  - title: 技术栈
    url: /categories/技术栈/
    subcategories:
      - title: Python
        url: /categories/技术栈/Python/
  - title: 算法
    url: /categories/算法/
    subcategories:
      - title: 动态规划
        url: /categories/算法/动态规划/
  - title: 八股
    url: /categories/八股/
    subcategories:
      - title: 面试题
        url: /categories/八股/面试题/
  - title: 基础
    url: /categories/基础/
    subcategories:
      - title: 计算机网络
        url: /categories/基础/计算机网络/
  - title: 随笔
    url: /categories/随笔/
    subcategories:
      - title: 学习感悟
        url: /categories/随笔/学习感悟/

# 插件
plugins:
  - jekyll-feed