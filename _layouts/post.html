---
layout: default
---

<article>
  <h1>{{ page.title }}</h1>
  <div class="meta">
    {{ page.date | date: '%Y年%m月%d日' }} | 
    {% if page.categories and page.categories.size > 0 %}
      {% assign cat = page.categories | first %}
      <a href="/categories/{{ cat }}/">{{ cat }}</a>
    {% else %}
      未分类
    {% endif %}
  </div>
  <div class="content">
    {{ content }}
  </div>
</article>
